<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" fill="none">
  <defs>
    <clipPath id="shield-clip">
      <path d="M250 20 L430 80 L430 260 Q430 380 250 470 Q70 380 70 260 L70 80 Z"/>
    </clipPath>
  </defs>

  <!-- Shield outline -->
  <path d="M250 20 L430 80 L430 260 Q430 380 250 470 Q70 380 70 260 L70 80 Z" 
        stroke="white" stroke-width="8" fill="none" stroke-linejoin="round"/>

  <!-- Inner shield line -->
  <path d="M250 40 L415 95 L415 258 Q415 370 250 455 Q85 370 85 258 L85 95 Z" 
        stroke="white" stroke-width="2" fill="none" stroke-linejoin="round" opacity="0.3"/>

  <!-- "Full" text - script style -->
  <text x="160" y="200" font-family="'Georgia', 'Times New Roman', serif" 
        font-style="italic" font-size="72" fill="white" font-weight="400"
        letter-spacing="2">Full</text>

  <!-- "Shine" text - bold -->
  <text x="140" y="290" font-family="'Arial Black', 'Helvetica Neue', sans-serif" 
        font-size="90" fill="white" font-weight="900"
        letter-spacing="-2">Shine</text>

  <!-- Red ribbon banner -->
  <path d="M120 310 L380 310 L395 340 L380 370 L120 370 L105 340 Z" 
        fill="#c81e1e"/>
  
  <!-- Ribbon fold left -->
  <path d="M105 340 L120 310 L120 370 Z" fill="#a01818"/>
  
  <!-- Ribbon fold right -->
  <path d="M395 340 L380 310 L380 370 Z" fill="#a01818"/>

  <!-- "Detailing" text on ribbon -->
  <text x="250" y="355" font-family="'Arial', 'Helvetica Neue', sans-serif" 
        font-size="32" fill="white" font-weight="700"
        text-anchor="middle" letter-spacing="3" font-style="italic">Detailing</text>

  <!-- Car silhouette - right side -->
  <g transform="translate(310, 100) scale(0.65)" opacity="0.9">
    <!-- Car body -->
    <path d="M0 180 L30 180 L50 140 L90 110 L140 100 L180 100 L220 110 L250 140 L260 180 L260 200 L0 200 Z" 
          stroke="white" stroke-width="5" fill="none" stroke-linejoin="round"/>
    <!-- Roof -->
    <path d="M90 110 L110 60 L190 50 L220 110" 
          stroke="white" stroke-width="5" fill="none" stroke-linejoin="round"/>
    <!-- Window divider -->
    <path d="M150 55 L150 105" 
          stroke="white" stroke-width="3" fill="none"/>
    <!-- Front wheel well -->
    <circle cx="65" cy="200" r="30" stroke="white" stroke-width="5" fill="none"/>
    <!-- Rear wheel well -->
    <circle cx="210" cy="200" r="30" stroke="white" stroke-width="5" fill="none"/>
    <!-- Headlight -->
    <path d="M245 150 L260 150 L260 175 L250 175" 
          stroke="white" stroke-width="3" fill="none"/>
    <!-- Door line -->
    <path d="M150 105 L150 195" 
          stroke="white" stroke-width="2" fill="none" opacity="0.5"/>
  </g>
</svg>
